<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caliche's Operations Hub</title>
    <style>
        :root { --caliches-blue: #4a68b1; --caliches-pink: #c53a74; --light-gray: #f0f4f8; --white: #ffffff; --pass-green: #28a745; --fail-red: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light-gray); margin: 0; padding: 0; color: #333; }
        
        /* Splash & Menu */
        #splash-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--caliches-blue); display:flex; justify-content:center; align-items:center; z-index:9999; }
        .app-view { display:none; }
        #main-menu { padding:20px; max-width:500px; margin: 0 auto; text-align:center; }
        .menu-btn { display:block; width:100%; background:white; color:var(--caliches-blue); padding:25px; margin-bottom:15px; font-weight:bold; font-size: 18px; border:2px solid var(--caliches-blue); border-radius:12px; cursor:pointer; }
        .menu-btn.pink { color:var(--caliches-pink); border-color:var(--caliches-pink); }
        .menu-btn.green { color:var(--pass-green); border-color:var(--pass-green); }
        
        /* Carousel */
        .slider-wrapper { position:relative; width:100%; max-width:350px; height:250px; margin:15px auto 30px auto; border-radius:16px; overflow:hidden; border:3px solid var(--caliches-blue); background:white; }
        .slides { display:flex; width:200%; height:100%; transition:transform 0.5s ease-in-out; }
        .slide { width:50%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px; box-sizing:border-box; }
        .slide-img { max-width:100%; max-height:100%; object-fit:contain; }
        .arrow { position:absolute; top:50%; background:rgba(255,255,255,0.9); border:none; font-size:24px; width:40px; height:40px; border-radius:50%; cursor:pointer; z-index:10; }
        .prev-arrow { left:10px; } .next-arrow { right:10px; }
        
        /* Form Layout & Spacing */
        .back-btn { background: #333; color: white; border: none; padding: 12px 20px; font-size: 14px; font-weight: bold; width: 100%; text-align: left; cursor: pointer; }
        .header { background-color:var(--caliches-blue); color:white; text-align:center; padding:20px; }
        .header.pink { background-color:var(--caliches-pink); }
        .header.green { background-color:var(--pass-green); }
        .container { max-width:700px; margin:15px auto; padding:0 15px; }
        
        .info-group { background:white; padding:15px; border-radius:12px; display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px; }
        .full-width { grid-column: span 2; }
        .category { background:white; border-radius:12px; padding:15px; margin-bottom:20px; border-top:6px solid var(--caliches-pink); }
        .category.green-top { border-top-color: var(--pass-green); }
        
        /* Input & Form Controls */
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; font-family: inherit; background-color: #fafafa; }
        .form-label { display: block; font-weight: bold; margin-bottom: 6px; color: var(--caliches-blue); font-size: 14px; }
        .form-spacer { margin-bottom: 15px; }
        
        /* Questions & Photos */
        .question { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .rating-group { display:flex; justify-content:space-between; gap:4px; margin-top:10px; }
        .rating-group label { flex:1; text-align:center; padding:10px 0; background:#eee; border-radius:6px; cursor:pointer; font-weight:bold; }
        .photo-btn { background: #e0e0e0; padding: 10px; border-radius: 6px; cursor: pointer; display: block; margin-top: 10px; font-size: 12px; font-weight: bold; text-align: center;}
        
        /* Submit Buttons */
        .save-btn { width:100%; background:var(--caliches-pink); color:white; border:none; padding:20px; font-weight:bold; font-size: 18px; border-radius:12px; cursor:pointer; margin-bottom:60px; }
        .save-btn.blue { background:var(--caliches-blue); }
        .save-btn.green { background:var(--pass-green); }
    </style>
</head>
<body>
    <div id="splash-screen"><h1 style="color:white; font-size: 36px;">Caliche's</h1></div>

    <div id="main-menu" class="app-view">
        <div class="slider-wrapper">
            <button class="arrow prev-arrow" onclick="moveSlide(-1)">&#10094;</button>
            <button class="arrow next-arrow" onclick="moveSlide(1)">&#10095;</button>
            <div class="slides" id="slider-track">
                <div class="slide"><img src="caliches-cone.png" alt="Cone Icon" style="max-width:100%"></div>
                <div class="slide" style="background:var(--caliches-pink); color:white;">
                    <h3 style="color: #ffd700; text-transform: uppercase;">Weekly Focus</h3>
                    <p style="font-size: 20px; font-weight: bold;">Cleanliness, Friendliness, Speed, & Quality!</p>
                </div>
            </div>
        </div>
        <button class="menu-btn" onclick="openForm('popInView')">📋 Store Pop-In Inspection</button>
        <button class="menu-btn pink" onclick="openForm('driverView')">🚚 Vehicle & Trailer Check-Out</button>
        <button class="menu-btn green" onclick="openForm('shortageView')">📦 Report Shortages</button>
    </div>

    <div id="popInView" class="app-view">
        <button class="back-btn" onclick="openMenu()">🔙 Back to Menu</button>
        <div class="header"><h3>STORE POP-IN</h3></div>
        <div class="container">
            <form id="auditForm">
                <div class="info-group">
                    <div>
                        <label class="form-label">Location:</label>
                        <select name="Location" required>
                            <option value="" disabled selected>Select Location</option>
                            <option>Roadrunner</option><option>Valley</option><option>Lenox</option>
                            <option>Alamogordo</option><option>Roswell</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Date:</label>
                        <input type="date" name="Date" id="dt" required>
                    </div>
                    <div class="full-width">
                        <label class="form-label">Shift Leader Name:</label>
                        <input type="text" name="ShiftLeader" placeholder="Type name here" required>
                    </div>
                    <div class="full-width">
                        <label class="form-label">Conducted By:</label>
                        <input type="text" name="ConductedBy" placeholder="Your name here" required>
                    </div>
                </div>
                
                <div id="questionsContainer"></div>
                
                <input type="hidden" id="hiddenReportHtml" name="ReportHTML">
                <button type="button" class="save-btn blue" id="submitBtn" onclick="submitAudit()">🚀 SUBMIT POP-IN TO OFFICE</button>
            </form>
        </div>
    </div>

    <div id="driverView" class="app-view">
        <button class="back-btn" onclick="openMenu()">🔙 Back to Menu</button>
        <div class="header pink"><h3>DRIVER CHECK-OUT</h3></div>
        <div class="container">
            <form id="driverForm">
                <div class="info-group">
                    <div class="full-width">
                        <label class="form-label">Select Truck:</label>
                        <select name="vehicle" required>
                            <option value="" disabled selected>Choose a truck...</option>
                            <option>2500</option><option>3500</option><option>Caliche's Cruiser</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Starting Mileage:</label>
                        <input type="number" name="mileage" placeholder="Odometer">
                    </div>
                    <div>
                        <label class="form-label">Date:</label>
                        <input type="date" name="date" id="driverDt">
                    </div>
                    <div class="full-width">
                        <label class="form-label">Destination / Event:</label>
                        <input type="text" name="destination" placeholder="Where are you going?">
                    </div>
                </div>

                <div class="category">
                    <h2>Sign-Off</h2>
                    <label class="form-label">Damage Report (if any):</label>
                    <textarea name="damage" rows="3" class="form-spacer" placeholder="Note any scratches, dents, or issues..."></textarea>
                    
                    <label class="form-label">Shift Leader Signature:</label>
                    <input type="text" name="signature" placeholder="Type your full name" required>
                </div>

                <button type="button" class="save-btn pink" onclick="submitDriverForm()">🚀 SUBMIT DRIVER CHECKOUT</button>
            </form>
        </div>
    </div>

    <div id="shortageView" class="app-view">
        <button class="back-btn" onclick="openMenu()">🔙 Back to Menu</button>
        <div class="header green"><h3>STORE SHORTAGE REPORT</h3></div>
        <div class="container">
            <form id="shortageForm">
                
                <div class="info-group">
                    <div class="full-width">
                        <label class="form-label">Select Store:</label>
                        <select name="Store" required>
                            <option value="" disabled selected>Select Store...</option>
                            <option>Roadrunner</option><option>Valley</option><option>Lenox</option>
                            <option>Alamogordo</option><option>Roswell</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Date:</label>
                        <input type="date" id="shortageDt" name="OrderDate" required>
                    </div>
                    <div>
                        <label class="form-label">Manager Name:</label>
                        <input type="text" name="ManagerName" placeholder="Your Name" required>
                    </div>
                </div>

                <div class="category green-top">
                    <h2 style="color: var(--pass-green); margin-top: 0;">Item Requests</h2>
                    
                    <div class="form-spacer">
                        <label class="form-label">Item 1 Name:</label>
                        <input type="text" name="Item1" placeholder="e.g., Seasonal Fruit, Cups">
                    </div>
                    <div class="form-spacer" style="border-bottom: 1px solid #eee; padding-bottom: 20px;">
                        <label class="form-label">Item 1 Quantity:</label>
                        <input type="text" name="Qty1" placeholder="e.g., 5 cases">
                    </div>

                    <div class="form-spacer" style="margin-top: 20px;">
                        <label class="form-label">Item 2 Name:</label>
                        <input type="text" name="Item2" placeholder="Item name">
                    </div>
                    <div class="form-spacer">
                        <label class="form-label">Item 2 Quantity:</label>
                        <input type="text" name="Qty2" placeholder="Quantity">
                    </div>
                </div>

                <div class="category green-top">
                    <h2 style="color: var(--pass-green); margin-top: 0;">Urgency / Notes</h2>
                    <textarea name="Notes" rows="3" placeholder="Is this needed urgently? Any special instructions?"></textarea>
                </div>

                <button type="button" class="save-btn green" onclick="submitShortage()">🚀 SUBMIT SHORTAGE REPORT</button>
            </form>
        </div>
    </div>

    <script>
        const G_URL = 'https://script.google.com/macros/s/AKfycbzDrLR4bBx0J3B0cFhjEFqrfDQnkAA-zdZRy85Bb_Ppjick5IoJmudUt_HgKZmhDBlNcw/exec';
        const DRIVER_G_URL = 'https://script.google.com/macros/s/AKfycbxOX-8kceveLh1xU8o0sR7qmG9sX_WtC0juH0ZSojfjU9_7U2qNQfV3UpB4X8b9oYth/exec';
        
        // Carousel Slider
        let currentSlide = 0;
        function moveSlide(dir) { 
            currentSlide = (currentSlide + dir + 2) % 2; 
            document.getElementById('slider-track').style.transform = `translateX(-${currentSlide * 50}%)`; 
            resetTimer(); 
        }
        function resetTimer() { 
            clearInterval(window.timer); 
            window.timer = setInterval(()=>moveSlide(1), 10000); 
        }
        
        // App Initialization
        window.onload = () => { 
            setTimeout(() => { 
                document.getElementById('splash-screen').style.display='none'; 
                document.getElementById('main-menu').style.display='block'; 
                resetTimer(); 
            }, 1000); 
            generatePopIn();
            
            // Set today's date automatically
            let today = new Date().toISOString().split('T')[0];
            document.getElementById('dt').value = today;
            document.getElementById('driverDt').value = today;
            document.getElementById('shortageDt').value = today;
        };
        
        // Navigation
        function openMenu() { 
            document.querySelectorAll(".app-view").forEach(e=>e.style.display='none'); 
            document.getElementById('main-menu').style.display='block'; 
            window.scrollTo(0, 0);
        }
        function openForm(id) { 
            document.querySelectorAll(".app-view").forEach(e=>e.style.display='none'); 
            document.getElementById(id).style.display='block'; 
            window.scrollTo(0, 0);
        }

        // Pop-In Question Generator
        const questions = [
            { cat: "Team Member Performance", q: ["Moving with a purpose", "Following dress code", "Teamwork is being conducted"] },
            { cat: "Cleanliness", q: ["Stations wiped down", "Glove protocol followed", "Hands are washed"] },
            { cat: "Quality", q: ["Custard is high quality", "Fruits are fresh to taste", "Hot dogs are hot and plump"] }
        ];
        
        function generatePopIn() {
            let html = ""; let qIdx = 1;
            questions.forEach(group => {
                html += `<div class="category"><h2 style="color:var(--caliches-blue); margin-top:0;">${group.cat}</h2>`;
                group.q.forEach(text => {
                    html += `<div class="question"><p style="font-weight:600; margin-bottom:8px;">${text}</p><div class="rating-group">`;
                    for(let i=0; i<=5; i++) {
                        html += `<input type="radio" name="q${qIdx}" id="q${qIdx}-${i}" value="${i}" style="display:none;">
                                 <label for="q${qIdx}-${i}">${i==0?'N/A':i}</label>`;
                    }
                    html += `</div><input type="text" name="note${qIdx}" placeholder="Feedback details..." style="margin-top:10px;">
                             <div><label class="photo-btn">📸 Attach Photo<input type="file" onchange="preview(this, ${qIdx})" style="display:none"></label><div id="prev${qIdx}" style="margin-top:8px;"></div></div></div>`;
                    qIdx++;
                }); html += `</div>`;
            });
            document.getElementById('questionsContainer').innerHTML = html;
        }

        // Photo Preview for Pop-In
        function preview(input, id) { 
            if(input.files && input.files[0]) { 
                var reader = new FileReader(); 
                reader.onload = (e) => { document.getElementById('prev'+id).innerHTML = `<img src="${e.target.result}" style="height:60px; border-radius:6px; border:1px solid #ccc;">`; }; 
                reader.readAsDataURL(input.files[0]); 
            } 
        }

        // Submission Functions
        function submitAudit() {
            let form = document.getElementById('auditForm');
            let btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Sending Pop-In...";
            
            // Generate basic HTML backup for Apps Script PDF builder
            let pdfHtml = "<html><body style='font-family:sans-serif;'><h2>Pop-In Report</h2>";
            new FormData(form).forEach((v,k) => { if(v && k !== 'ReportHTML') pdfHtml += `<p><b>${k}:</b> ${v}</p>` });
            pdfHtml += "</body></html>";
            document.getElementById('hiddenReportHtml').value = pdfHtml;

            fetch(G_URL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
            .then(() => { alert("Pop-In Submitted Successfully!"); openMenu(); btn.disabled = false; btn.innerText="🚀 SUBMIT POP-IN TO OFFICE"; });
        }
        
        function submitDriverForm() { 
            let btn = document.querySelector('#driverView .save-btn');
            btn.innerText = "Sending Driver Log...";
            fetch(DRIVER_G_URL, { method: 'POST', body: new FormData(document.getElementById('driverForm')), mode: 'no-cors' })
            .then(() => { alert("Driver Check-Out Sent!"); openMenu(); btn.innerText="🚀 SUBMIT DRIVER CHECKOUT"; document.getElementById('driverForm').reset(); }); 
        }
        
        function submitShortage() { 
            let btn = document.querySelector('#shortageView .save-btn');
            btn.innerText = "Sending Shortage...";
            fetch(DRIVER_G_URL, { method: 'POST', body: new FormData(document.getElementById('shortageForm')), mode: 'no-cors' })
            .then(() => { alert("Shortage Report Sent!"); openMenu(); btn.innerText="🚀 SUBMIT SHORTAGE REPORT"; document.getElementById('shortageForm').reset(); }); 
        }
    </script>
</body>
</html>
